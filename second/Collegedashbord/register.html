<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Register Student</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<!-- Inline CSS -->
<style>
body {
    background: linear-gradient(to right, #74ebd5, #ACB6E5);
    font-family: Arial, sans-serif;
}
.sidebar {
    height: 100vh;
    background: #343a40;
    color: white;
    padding: 20px;
}
.sidebar a {
    color: #ddd;
    display: block;
    padding: 12px;
    margin-bottom: 5px;
    border-radius: 8px;
    text-decoration: none;
    transition: 0.3s;
}
.sidebar a:hover {
    background: #0d6efd;
    color: #fff;
    transform: translateX(5px);
}
.icon-hover { cursor:pointer; transition:0.3s; }
.icon-hover:hover { color:#0d6efd; transform:scale(1.2);}
.form-card {border-radius: 15px; background:#fff; padding:20px; box-shadow:0 8px 20px rgba(0,0,0,0.1);}
button {border-radius:10px; transition:0.3s;}
button:hover {transform: scale(1.05);}
</style>
</head>
<body>

<div class="container-fluid">
  <div class="row">

    <!-- Sidebar -->
    <nav class="col-md-2 sidebar d-none d-md-block">
      <h4 class="mb-4"><i class="bi bi-mortarboard-fill"></i> Admin</h4>
      <a href="index.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
      <a href="register.html"><i class="bi bi-person-plus-fill"></i> Add Student</a>
      <a href="list.html"><i class="bi bi-table"></i> Student List</a>
    </nav>

    <!-- Main Content -->
    <main class="col-md-10 ms-sm-auto px-4">

      <nav class="navbar navbar-light bg-light mt-2 rounded shadow-sm px-3">
        <div class="container-fluid">
          <button class="btn btn-dark d-md-none" onclick="toggleSidebar()">☰</button>
          <span class="navbar-brand fw-bold">Register Student</span>
          <div class="d-flex align-items-center">
            <i class="bi bi-bell fs-5 me-3 icon-hover" title="Notifications"></i>
            <div class="dropdown">
              <i class="bi bi-person-circle fs-4 dropdown-toggle icon-hover" data-bs-toggle="dropdown"></i>
              <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item" href="#">Profile</a></li>
                <li><a class="dropdown-item" href="#">Settings</a></li>
                <li><hr></li>
                <li><a class="dropdown-item text-danger" href="#">Logout</a></li>
              </ul>
            </div>
          </div>
        </div>
      </nav>

      <div class="container mt-4">
        <div class="form-card">
          <h3 class="text-center mb-4"><i class="bi bi-person-plus-fill"></i> Student Registration</h3>
          <div class="row">
            <div class="col-md-6 mb-3"><input type="text" id="name" class="form-control" placeholder="Full Name"></div>
            <div class="col-md-6 mb-3"><input type="email" id="email" class="form-control" placeholder="Email (Gmail only)"></div>
            <div class="col-md-6 mb-3"><input type="text" id="mobile" class="form-control" placeholder="Mobile Number"></div>
            <div class="col-md-6 mb-3"><input type="date" id="dob" class="form-control"></div>
            <div class="col-md-6 mb-3">
              <select id="course" class="form-select">
                <option value="">Select Course</option>
                <option>BSc</option>
                <option>BCA</option>
                <option>BBA</option>
                <option>MBA</option>
              </select>
            </div>
            <div class="col-md-6 mb-3">
              <select id="gender" class="form-select">
                <option value="">Select Gender</option>
                <option>Male</option>
                <option>Female</option>
              </select>
            </div>
            <div class="col-12 mb-3"><textarea id="address" class="form-control" placeholder="Address"></textarea></div>
          </div>
          <button class="btn btn-primary w-100" onclick="submitData()">Register <i class="bi bi-check2-circle"></i></button>
          <p id="error" class="text-danger mt-2 text-center"></p>
        </div>
      </div>

    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>
