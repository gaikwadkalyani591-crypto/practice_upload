<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>College Dashboard</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {background:#f4f6f9; font-family:Arial,sans-serif;}
.sidebar {height:100vh; background:#343a40; color:white; padding:20px;}
.sidebar a {color:#ddd; display:block; padding:12px; margin-bottom:5px; border-radius:8px; text-decoration:none; transition:0.3s;}
.sidebar a:hover {background:#0d6efd; color:#fff; transform:translateX(5px);}
.icon-hover {cursor:pointer; transition:0.3s;}
.icon-hover:hover {color:#0d6efd; transform:scale(1.2);}
.card {border-radius:12px; padding:20px; box-shadow:0 8px 20px rgba(0,0,0,0.1);}
.card:hover {transform:translateY(-5px);}
.cards-container {display:flex; flex-wrap:wrap; gap:20px;}
</style>
</head>
<body>

<div class="container-fluid">
  <div class="row">

    <!-- Sidebar -->
    <nav class="col-md-2 sidebar d-none d-md-block">
      <h4 class="mb-4"><i class="bi bi-mortarboard-fill"></i> Admin</h4>
      <a href="index.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
      <a href="register.html"><i class="bi bi-person-plus-fill"></i> Add Student</a>
      <a href="list.html"><i class="bi bi-table"></i> Student List</a>
    </nav>

    <!-- Main Content -->
    <main class="col-md-10 ms-sm-auto px-4">

      <nav class="navbar navbar-light bg-light mt-2 rounded shadow-sm px-3">
        <div class="container-fluid">
          <button class="btn btn-dark d-md-none" onclick="toggleSidebar()">☰</button>
          <span class="navbar-brand fw-bold">Dashboard</span>
          <div class="d-flex align-items-center">
            <i class="bi bi-bell fs-5 me-3 icon-hover" title="Notifications"></i>
            <div class="dropdown">
              <i class="bi bi-person-circle fs-4 dropdown-toggle icon-hover" data-bs-toggle="dropdown"></i>
              <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item" href="#">Profile</a></li>
                <li><a class="dropdown-item" href="#">Settings</a></li>
                <li><hr></li>
                <li><a class="dropdown-item text-danger" href="#">Logout</a></li>
              </ul>
            </div>
          </div>
        </div>
      </nav>

      <div class="container mt-4">
        <div class="cards-container">

          <div class="card text-center flex-fill">
            <h5><i class="bi bi-people-fill"></i> Total Students</h5>
            <h3 id="totalStudents">0</h3>
          </div>

          <div class="card text-center flex-fill">
            <h5><i class="bi bi-journal-bookmark-fill"></i> Courses</h5>
            <h3>4</h3>
          </div>

          <div class="card text-center flex-fill">
            <h5><i class="bi bi-person-plus-fill"></i> New Registrations</h5>
            <h3 id="newRegistrations">0</h3>
          </div>

        </div>
      </div>

    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script>
  // Update dashboard cards dynamically
  function updateDashboard() {
    const students = JSON.parse(localStorage.getItem("students")) || [];
    document.getElementById("totalStudents").innerText = students.length;
    document.getElementById("newRegistrations").innerText = students.length;
  }

  window.onload = () => {
    loadData();       // Load student table if list page
    updateDashboard(); // Update dashboard counters
  }
</script>

</body>
</html>
