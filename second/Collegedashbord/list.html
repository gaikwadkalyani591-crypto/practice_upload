<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Student List</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
body { background:#f4f6f9; font-family:Arial,sans-serif;}
.sidebar {height:100vh; background:#343a40; color:white; padding:20px;}
.sidebar a {color:#ddd; display:block; padding:12px; margin-bottom:5px; border-radius:8px; text-decoration:none; transition:0.3s;}
.sidebar a:hover {background:#0d6efd; color:#fff; transform:translateX(5px);}
.icon-hover {cursor:pointer; transition:0.3s;}
.icon-hover:hover {color:#0d6efd; transform:scale(1.2);}
.card {border-radius:12px; padding:20px; box-shadow:0 8px 20px rgba(0,0,0,0.1);}
.table-hover tbody tr:hover {background-color:#f1f3f5;}
</style>
</head>
<body>

<div class="container-fluid">
  <div class="row">

    <!-- Sidebar -->
    <nav class="col-md-2 sidebar d-none d-md-block">
      <h4 class="mb-4"><i class="bi bi-mortarboard-fill"></i> Admin</h4>
      <a href="index.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
      <a href="register.html"><i class="bi bi-person-plus-fill"></i> Add Student</a>
      <a href="list.html"><i class="bi bi-table"></i> Student List</a>
    </nav>

    <main class="col-md-10 ms-sm-auto px-4">

      <nav class="navbar navbar-light bg-light mt-2 rounded shadow-sm px-3">
        <div class="container-fluid">
          <button class="btn btn-dark d-md-none" onclick="toggleSidebar()">☰</button>
          <span class="navbar-brand fw-bold">Student List</span>
          <div class="d-flex align-items-center">
            <i class="bi bi-bell fs-5 me-3 icon-hover" title="Notifications"></i>
            <div class="dropdown">
              <i class="bi bi-person-circle fs-4 dropdown-toggle icon-hover" data-bs-toggle="dropdown"></i>
              <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item" href="#">Profile</a></li>
                <li><a class="dropdown-item" href="#">Settings</a></li>
                <li><hr></li>
                <li><a class="dropdown-item text-danger" href="#">Logout</a></li>
              </ul>
            </div>
          </div>
        </div>
      </nav>

      <div class="container mt-4">
        <div class="card">
          <h4 class="mb-3"><i class="bi bi-table"></i> Registered Students</h4>
          <input type="text" id="searchInput" class="form-control mb-3" placeholder="Search students..." onkeyup="searchTable()">
          <div class="table-responsive">
            <table class="table table-bordered table-hover text-center">
              <thead class="table-dark">
                <tr>
                  <th><i class="bi bi-person-fill"></i> Name</th>
                  <th><i class="bi bi-envelope-fill"></i> Email</th>
                  <th><i class="bi bi-phone-fill"></i> Mobile</th>
                  <th><i class="bi bi-book-fill"></i> Course</th>
                  <th><i class="bi bi-gender-ambiguous"></i> Gender</th>
                </tr>
              </thead>
              <tbody id="studentList"></tbody>
            </table>
          </div>
        </div>
      </div>

    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>
