<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>College Admin Dashboard</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { overflow-x: hidden; }

/* Sidebar */
.sidebar {
    height: 100vh;
    background: #343a40;
    color: white;
}
.sidebar a {
    color: #ddd;
    padding: 10px;
    display: block;
    text-decoration: none;
}
.sidebar a:hover { background: #495057; }

/* Cards */
.card-box:hover {
    transform: translateY(-5px);
    transition: 0.3s;
}

/* Login Page */
#loginPage {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f8f9fa;
}

/* Hide dashboard initially */
#dashboardPage { display: none; }
</style>
</head>

<body>

<!-- ================= LOGIN PAGE ================= -->
<div id="loginPage">
    <div class="card p-4 shadow" style="width: 300px;">
        <h4 class="text-center">Admin Login</h4>
        <input type="text" id="username" class="form-control my-2" placeholder="Username">
        <input type="password" id="password" class="form-control my-2" placeholder="Password">
        <button class="btn btn-primary w-100" onclick="login()">Login</button>
        <p id="error" class="text-danger mt-2"></p>
    </div>
</div>

<!-- ================= DASHBOARD ================= -->
<div id="dashboardPage" class="container-fluid">
<div class="row">

<!-- Sidebar -->
<nav class="col-md-2 sidebar p-3">
    <h4>Admin</h4>
    <a href="#">Dashboard</a>
    <a href="#">Students</a>
    <a href="#">Reports</a>
    <a href="#" onclick="logout()">Logout</a>
</nav>

<!-- Main -->
<main class="col-md-10 p-4">

<h3>Dashboard</h3>

<!-- Cards -->
<div class="row">
    <div class="col-md-3">
        <div class="card bg-primary text-white card-box p-3">
            <h5>Students</h5><h2>1200</h2>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card bg-success text-white card-box p-3">
            <h5>Faculty</h5><h2>75</h2>
        </div>
    </div>
</div>

<!-- Charts -->
<div class="row mt-4">
    <div class="col-md-6">
        <canvas id="barChart"></canvas>
    </div>
    <div class="col-md-6">
        <canvas id="pieChart"></canvas>
    </div>
</div>

<!-- Student Table -->
<div class="mt-5">
    <h4>Student List</h4>

    <input type="text" id="searchInput" class="form-control mb-3" placeholder="Search student..." onkeyup="searchTable()">

    <table class="table table-bordered">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Course</th>
            </tr>
        </thead>
        <tbody id="studentTable">
            <tr><td>1</td><td>Rahul Sharma</td><td>BSc</td></tr>
            <tr><td>2</td><td>Anjali Verma</td><td>BCA</td></tr>
            <tr><td>3</td><td>Amit Singh</td><td>BBA</td></tr>
            <tr><td>4</td><td>Pooja Patel</td><td>MBA</td></tr>
        </tbody>
    </table>
</div>

</main>
</div>
</div>

<script>
/* ================= LOGIN SYSTEM ================= */
function login() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if(user === "admin" && pass === "1234"){
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("dashboardPage").style.display = "block";
        loadCharts();
    } else {
        document.getElementById("error").innerText = "Invalid login!";
    }
}

function logout() {
    document.getElementById("dashboardPage").style.display = "none";
    document.getElementById("loginPage").style.display = "flex";
}

/* ================= CHARTS ================= */
function loadCharts(){

    new Chart(document.getElementById("barChart"), {
        type: 'bar',
        data: {
            labels: ['BSC', 'BCA', 'BBA', 'MBA'],
            datasets: [{
                label: 'Students',
                data: [300, 250, 200, 150],
                backgroundColor: ['blue','green','orange','red']
            }]
        }
    });

    new Chart(document.getElementById("pieChart"), {
        type: 'pie',
        data: {
            labels: ['Male', 'Female'],
            datasets: [{
                data: [700, 500],
                backgroundColor: ['#007bff','#ff4081']
            }]
        }
    });
}

/* ================= SEARCH ================= */
function searchTable() {
    let input = document.getElementById("searchInput").value.toLowerCase();
    let rows = document.querySelectorAll("#studentTable tr");

    rows.forEach(row => {
        let text = row.innerText.toLowerCase();
        row.style.display = text.includes(input) ? "" : "none";
    });
}
</script>

</body>
</html>
